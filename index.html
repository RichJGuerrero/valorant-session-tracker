<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Valorant Session Tracker</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>Valorant Session Tracker</h1>

        <p id="sessionStatus">No Active Session</p>

        <button id="startSessionButton">Start Session</button>

        <button id="endSessionButton">End Session</button>


        <p id="netRR">Net RR: 0</p>

        <p id="sessionSummary">Wins: 0 | Losses: 0 | Win Rate: 0%</p>

        <select id="agentInput">
            <option value="">Select Agent</option>
            <option value="Jett">Jett</option>
            <option value="Phoenix">Phoenix</option>
            <option value="Reyna">Reyna</option>
            <option value="Raze">Raze</option>
            <option value="Yoru">Yoru</option>
            <option value="Neon">Neon</option>
            <option value="Iso">Iso</option>
            <option value="Waylay">Waylay</option>
            <option value="Sova">Sova</option>
            <option value="Breach">Breach</option>
            <option value="Sky">Sky</option>
            <option value="KAY/O">KAY/O</option>
            <option value="Fade">Fade</option>
            <option value="Gekko">Gekko</option>
            <option value="Tejo">Tejo</option>
            <option value="Brimstone">Brimstone</option>
            <option value="Viper">Viper</option>
            <option value="Omen">Omen</option>
            <option value="Astra">Astra</option>
            <option value="Harbor">Harbor</option>
            <option value="Clove">Clove</option>
            <option value="Miks">Miks</option>
            <option value="Sage">Sage</option>
            <option value="Cypher">Cypher</option>
            <option value="Killjoy">Killjoy</option>
            <option value="Chamber">Chamber</option>
            <option value="Deadlock">Deadlock</option>
            <option value="Vyse">Vyse</option>
            <option value="Veto">Veto</option>
        </select>

        <br>

        <select id="mapInput">
            <option value="">Select Map</option>
            <option value="Abyss">Abyss</option>
            <option value="Ascent">Ascent</option>
            <option value="Bind">Bind</option>
            <option value="Breeze">Breeze</option>
            <option value="Corrode">Corrode</option>
            <option value="Fracture">Fracture</option>
            <option value="Haven">Haven</option>
            <option value="Icebox">Icebox</option>
            <option value="Lotus">Lotus</option>
            <option value="Pearl">Pearl</option>
            <option value="Split">Split</option>
            <option value="Sunset">Sunset</option>
            <option value="Summit">Summit</option>
        </select>

        <br>

        <input id="winRadio" type="radio" name="result" value="Win">
        <label for="winRadio">Win</label>

        <input id="lossRadio" type="radio" name="result" value="Loss">
        <label for="lossRadio">Loss</label>

        <br>

        <input id="rrChangeInput" type="text" placeholder="RR Change">

        <br>

        <input id="killsInput" type="text" placeholder="Kills">

        <br>

        <input id="deathsInput" type="text" placeholder="Deaths">

        <br>

        <input id="assistsInput" type="text" placeholder="Assists">

        <br>

        <button id="saveMatchButton">Save Match</button>

        <br>

        <ul id="matchHistoryList"></ul>

        <script src="script.js"></script>
    </body>
</html>
